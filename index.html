<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenScan</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner">
      <div class="stage">
        <div class="grid">
          <div class="strip">
            <div class="tip delay-18"></div>
            <div class="tip reverse delay-17"></div>
            <div class="tip delay-16"></div>
            <div class="tip reverse delay-15"></div>
            <div class="tip delay-14"></div>
          </div>
          <div class="strip">
            <div class="tip delay-01"></div>
            <div class="tip reverse delay-02"></div>
            <div class="tip delay-f"></div>
            <div class="tip reverse delay-e"></div>
            <div class="tip delay-d"></div>
            <div class="tip reverse delay-13"></div>
            <div class="tip delay-12"></div>
          </div>
          <div class="strip">
            <div class="tip reverse delay-03"></div>
            <div class="tip delay-04"></div>
            <div class="tip reverse delay-a"></div>
            <div class="tip delay-b"></div>
            <div class="tip reverse delay-c"></div>
            <div class="tip delay-11"></div>
            <div class="tip reverse delay-10"></div>
          </div>
          <div class="strip">
            <div class="tip reverse delay-05"></div>
            <div class="tip delay-06"></div>
            <div class="tip reverse delay-07"></div>
            <div class="tip delay-08"></div>
            <div class="tip reverse delay-09"></div>
          </div>
        </div>
      </div>
    </div>
    <p class="text" style="color: white; margin-top: 10px;">Identifying plant...</p>
  </div>

  <!-- decorative bokeh background -->
  <div class="bokeh-bg">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>
    <div class="bokeh bokeh-4"></div>
  </div>

  <div class="watermark">
    <svg width="300" height="300" viewBox="0 0 200 200" fill="none">
      <path d="M100 20C60 20 30 50 30 90C30 130 60 160 100 180C140 160 170 130 170 90C170 50 140 20 100 20"
        stroke="#3E5622" stroke-width="0.5" opacity="0.08" />
      <path d="M100 40C70 40 50 60 50 90C50 120 70 140 100 160" stroke="#3E5622" stroke-width="0.5" opacity="0.06" />
      <circle cx="100" cy="50" r="8" stroke="#3E5622" stroke-width="0.5" opacity="0.05" />
      <circle cx="80" cy="80" r="5" stroke="#3E5622" stroke-width="0.5" opacity="0.04" />
      <circle cx="120" cy="70" r="6" stroke="#3E5622" stroke-width="0.5" opacity="0.05" />
      <path d="M70 120 Q85 100 100 110 Q115 100 130 120" stroke="#3E5622" stroke-width="0.5" opacity="0.04" />
    </svg>
  </div>

  <a href="/settings" class="settings">⚙️</a>
  <div class="app-logo">
    <div class="logo-icon">
      <svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M45 72 L45 46" stroke="#95B46A" stroke-width="3" stroke-linecap="round"/>
        <path d="M45 58 C43 53 38 46 31 43 C24 40 17 41 16 45 C15 50 20 57 28 59 C36 61 44 59 45 58 Z"
          stroke="#95B46A" stroke-width="2.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M45 58 C36 53 24 46 17 43" stroke="#95B46A" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
        <path d="M45 50 C47 44 54 36 62 33 C70 30 77 32 78 36 C79 41 74 49 66 51 C58 54 46 51 45 50 Z"
          stroke="#95B46A" stroke-width="2.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M45 50 C54 44 64 37 77 34" stroke="#95B46A" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
        <path d="M30 67 C29 62 27 58 26 55" stroke="#95B46A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M36 66 C35 61 34 57 33 54" stroke="#95B46A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M54 66 C55 61 57 57 58 54" stroke="#95B46A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M60 67 C62 62 63 58 64 55" stroke="#95B46A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M14 76 C19 68 30 65 38 67 C41 68 43 69 45 69 C47 69 49 68 52 67 C60 65 71 68 76 76"
          stroke="#95B46A" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="79" r="1.8" fill="#95B46A" opacity="0.65"/>
        <circle cx="33" cy="82" r="1.5" fill="#95B46A" opacity="0.55"/>
        <circle cx="45" cy="83" r="1.4" fill="#95B46A" opacity="0.45"/>
        <circle cx="57" cy="82" r="1.5" fill="#95B46A" opacity="0.55"/>
        <circle cx="68" cy="79" r="1.8" fill="#95B46A" opacity="0.65"/>
      </svg>
    </div>
  </div>
  <h1>GreenScan</h1>
  <p class="app-desc">Identify any plant instantly</p>
  <div class="cards">
    <div class="card-1">
      <a href="/camera" class="card primary">
        <div class="btn-layers">
          <div class="btn-inner"></div>
        </div>
        <svg class="card-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="4" />
        </svg>
        <div class="card-text">
          <b>Take a picture</b>
          <small>Point your camera at any plant</small>
        </div>
      </a>
    </div>
    <div class="row">
      <label for="fileInput" class="card mint" style="cursor: pointer;">
        <svg class="card-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" />
        <b>Upload photo</b>
        <small>From your library</small>
      </label>
      <a href="/search" class="card lime">
        <svg class="card-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <b>Plant search</b>
        <small>Browse database</small>
      </a>
    </div>
  </div>
    <footer class="footer">
      <small style="color: #172815;">Powered by <a id="permapeople" href="https://permapeople.org" target="_blank">Permapeople.org</a> & <a id="plantnet"href="https://plantnet.org" target="_blank">Pl@ntNet.org</a></small>
    </footer>
  

  <div id="Tutorial">
    <div id="textContainer">

    </div>
  </div>

  <div id="Mascot">
    <button id="startTutorial"><img style="height: 80px; width: 80px;" src="/tutorial_mascot.svg"/></button>
  </div>

  <script src="/uploadImage.js"></script>
  <script src="/tutorial.js"></script>
</body>

</html>
