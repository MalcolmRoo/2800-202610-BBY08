<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForageSafe - Scan</title>
    <link href="styles/style.css" rel="stylesheet" />
  </head>
  <body class="camera-page">
  <!-- decorative bokeh background -->
  <div class="bokeh-bg">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>
    <div class="bokeh bokeh-4"></div>
  </div>

  <!-- full screen camera canvas -->
  <canvas id="camCanvas"></canvas>

  <!-- UI overlay on top of camera -->
  <div id="overlay">
    <!-- top bar -->
    <div id="top-bar">
      <a href="/" id="back-btn">←</a>
      <h1>Scan Plant</h1>
    </div>

    

    <!-- floating shutter button -->
    <button id="shutterBtn" class="shutter-btn"></button>

    <!-- hint text -->
    <p id="hint">Point camera at the plant</p>
  </div>

    <!-- loading overlay — hidden until capture -->
    <div id="loading-overlay" style="display: none">
      <p id="loading-text">Analyzing with PlantNet...</p>
      <p id="loading-sub">Checking Vancouver road proximity...</p>
    </div>

    <script src="src/identify.js"></script>
    <script src="src/camera.js"></script>
    
  </body>
</html>
