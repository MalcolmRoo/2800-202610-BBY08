<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GreenScan</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <a href="/" id="back-btn" aria-label="Go back">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </a>

        <div id="loginForm" style="display: block;">
            <form class="accountForms" method="post" action="/loginSubmit">
                <input type="email" name="email" id="loginEmail" placeholder="example@email.com" required/>
                <input type="password" name="password" id="loginPassword" placeholder="Password" required/>
                <button type="submit">Login</button>
            </form>
        </div>
        <div id="signUpForm" style="display: none;">
            <form class="accountForms" method="post" action="/signUpSubmit">
                <input type="text" name="username" id="loginName" placeholder="Username" required/>
                <input type="email" name="email" id="signUpEmail" placeholder="example@email.com" required/>
                <input type="password" name="password" id="signUpPassword" placeholder="Password" required/>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <p id="message">Don't have an account?</p>
        <button id="changeMode">Sign up</button>
    </body>
     <script src="/global.js"></script>
     <script src="/login.js"></script>
</html>
