<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenScan - Result</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="result-page">
      <!-- Hero panel — plant icon, name, stats bar -->
      <div id="hero-panel">
        <a href="/" id="back-btn" aria-label="Go back">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </a>

        <button type="button" id="fav-btn" aria-label="Add to favorites">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.77l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            />
          </svg>
        </button>

        <!-- Plant icon circle — changes color based on edibility -->
        <div id="plant-icon">
          <svg width="52" height="52" viewBox="0 0 90 90" fill="none">
            <path
              d="M45 72 L45 46"
              stroke="#95B46A"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M45 58 C43 53 38 46 31 43 C24 40 17 41 16 45 C15 50 20 57 28 59 C36 61 44 59 45 58 Z"
              stroke="#95B46A"
              stroke-width="2.8"
              fill="none"
              stroke-linecap="round"
            />
            <path
              d="M45 50 C47 44 54 36 62 33 C70 30 77 32 78 36 C79 41 74 49 66 51 C58 54 46 51 45 50 Z"
              stroke="#95B46A"
              stroke-width="2.8"
              fill="none"
              stroke-linecap="round"
            />
            <path
              d="M14 76 C19 68 30 65 38 67 C41 68 43 69 45 69 C47 69 49 68 52 67 C60 65 71 68 76 76"
              stroke="#95B46A"
              stroke-width="2.8"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
        </div>

        <span class="label" id="plant-label">IDENTIFIED PLANT</span>
        <h1 id="common-name">Loading...</h1>
        <p id="latin-name"></p>

        <!-- Stats bar — filled by plantData.js -->
        <div id="stats-bar">
          <div class="stat">
            <span class="stat-value" id="confidence">--</span>
            <span class="stat-label">Confidence</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-value" id="stat-status">--</span>
            <span class="stat-label">Status</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-value" id="stat-edible">--</span>
            <span class="stat-label">Edible</span>
          </div>
        </div>
      </div>

      <!-- Plant container — image and dynamic sections injected by plantData.js -->
      <div id="content-area">
        <div id="plant-image-container">
          <img
            id="plant-image"
            src=""
            alt="Plant image"
            style="display: none"
          />
        </div>

        <!-- All sections injected dynamically -->
        <div id="plant-details"></div>

        <!-- Scan another plant button -->
        <button
          class="scan-another-btn"
          onclick="window.location.href = '/camera'"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <span>Scan Another Plant</span>
        </button>
      </div>
    </div>

    <!-- Mushroom chat — appears 5 seconds after plant identified -->
    <div id="mushroom-chat">
      <div id="speech-bubble">Do you have questions about this plant? 🌿</div>
      <button id="mushroom-btn" aria-label="Ask mushroom assistant">
        <img
          src="/tutorial_mascot.svg"
          alt="Mushroom assistant"
          width="65"
          height="65"
        />
      </button>
    </div>

    <script src="/favorites.js"></script>
    <script src="/plantData.js"></script>
    <script src="/chat.js"></script>
    <script src="/csvParse.js"></script>
  </body>
</html>
