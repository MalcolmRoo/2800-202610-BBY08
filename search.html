<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenScan - Search Plants</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="loading-overlay">
      <div class="spinner">
        <div class="stage">
          <div class="grid">
            <div class="strip">
              <div class="tip delay-18"></div>
              <div class="tip reverse delay-17"></div>
              <div class="tip delay-16"></div>
              <div class="tip reverse delay-15"></div>
              <div class="tip delay-14"></div>
            </div>
            <div class="strip">
              <div class="tip delay-01"></div>
              <div class="tip reverse delay-02"></div>
              <div class="tip delay-f"></div>
              <div class="tip reverse delay-e"></div>
              <div class="tip delay-d"></div>
              <div class="tip reverse delay-13"></div>
              <div class="tip delay-12"></div>
            </div>
            <div class="strip">
              <div class="tip reverse delay-03"></div>
              <div class="tip delay-04"></div>
              <div class="tip reverse delay-a"></div>
              <div class="tip delay-b"></div>
              <div class="tip reverse delay-c"></div>
              <div class="tip delay-11"></div>
              <div class="tip reverse delay-10"></div>
            </div>
            <div class="strip">
              <div class="tip reverse delay-05"></div>
              <div class="tip delay-06"></div>
              <div class="tip reverse delay-07"></div>
              <div class="tip delay-08"></div>
              <div class="tip reverse delay-09"></div>
            </div>
          </div>
        </div>
      </div>
      <p class="text" style="color: white; margin-top: 10px;">Searching for plants...</p>
    </div>

    <div id="search-page">

      <!-- TOP NAV: back button left, title center -->
      <div id="search-topbar">
        <a href="/" id="search-back-btn" aria-label="Go back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </a>
        <span id="search-topbar-title">Search Plants</span>
        <div style="width:44px;"></div>
      </div>

      <!-- SEARCH HERO -->
      <div id="search-hero">
        <p id="search-label">What plant are you looking for?</p>
        <form action="/search" method="get" class="search-bar" id="search-form">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input
            type="text"
            placeholder="e.g. Dandelion, Oak, Mint..."
            name="search"
            class="search-input"
            id="search-input"
            autocomplete="off"
            autofocus
          />
          <button type="submit" class="search-submit-btn" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </form>
      </div>

      <!-- RESULTS -->
      <div id="search-results"></div>

      <!-- NO RESULTS STATE -->
      <div id="no-results-mascot" style="display:none;">
        <img src="/tutorial_mascot.svg" alt="Mascot" id="mascot-no-results" />
        <div id="speech-no-results">Hmm, I couldn't find that one!</div>
      </div>

      <footer id="search-footer">
        <small>Powered by <a href="https://permapeople.org" target="_blank">Permapeople.org</a> &amp; <a href="https://plantnet.org" target="_blank">Pl@ntNet.org</a></small>
      </footer>

    </div>

    <script src="/search.js"></script>
  </body>
</html>
