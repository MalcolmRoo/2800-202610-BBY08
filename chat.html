<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenScan - Plant Chat</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="chat-page">
      <!-- Header — plant name + back button -->
      <div id="chat-page-header">
        <a id="chat-back-btn" aria-label="Go back to plant">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </a>
        <div id="chat-plant-info">
          <div id="chat-plant-name">Loading...</div>
          <div id="chat-plant-latin"></div>
        </div>
        <img src="/tutorial_mascot.svg" alt="Mushroom" id="chat-mascot" />
      </div>

      <!-- Messages -->
      <div id="chat-messages-area">
        <div class="chat-bubble ai">
          Hi! 🍄 I can answer questions about the plant you just identified.
          What would you like to know?
        </div>
      </div>

      <!-- Input -->
      <div id="chat-input-area">
        <input
          type="text"
          id="chat-input"
          placeholder="Ask about this plant..."
          maxlength="200"
        />
        <button id="chat-send-btn">→</button>
      </div>
    </div>

    <script src="/chatPage.js"></script>
  </body>
</html>
