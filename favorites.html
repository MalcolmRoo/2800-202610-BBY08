<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenScan - Favorites</title>
    <link href="global.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="fav-page">
      <div id="fav-hero">
        <a href="/" id="back-btn" aria-label="Go back">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </a>

        <img id="badge" src="foragebadge.png" />

        <div id="hero-text">
          <h1>Your Favorites</h1>
          <p id="fav-subtitle">Your saved plants</p>
        </div>
      </div>

      <div id="fav-grid"></div>

      <div id="empty-state">
        <svg
          width="80"
          height="80"
          viewBox="0 0 24 24"
          fill="none"
          stroke="rgba(168,216,96,0.25)"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.77l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        <h2>No Favorites Yet</h2>
        <p>Tap the heart on any plant to save it here.</p>
        <a href="/camera" class="fav-cta">Scan a Plant</a>
      </div>
    </div>

    <script src="/global.js"></script>
    <script src="/favorites.js"></script>
  </body>
</html>
